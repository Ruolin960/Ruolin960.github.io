<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>信息卡片展示</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        /* ===== 卡片容器 ===== */
        .card {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 44px 44px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 24px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 32px 80px rgba(0, 0, 0, 0.10),
                0 12px 32px rgba(0, 0, 0, 0.06);
        }

        /* ===== 头部装饰 ===== */
        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
        }

        .card-header .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4a6cf7, #6a4cf7);
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(74, 108, 247, 0.3);
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1e2c;
            letter-spacing: 0.5px;
        }

        .card-header .hint {
            margin-left: auto;
            font-size: 13px;
            color: #8e94a8;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* ===== 信息网格 ===== */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }

        .info-row:last-of-type {
            border-bottom: none;
        }

        .info-label {
            flex: 0 0 110px;
            font-size: 15px;
            font-weight: 500;
            color: #5e657a;
            letter-spacing: 0.3px;
            position: relative;
        }

        /* 标签后的冒号装饰 */
        .info-label::after {
            content: '：';
            color: #b0b8ce;
        }

        .info-value {
            flex: 1;
            font-size: 17px;
            font-weight: 500;
            color: #141824;
            padding: 2px 0 2px 4px;
            letter-spacing: 0.3px;
            word-break: break-all;
        }

        /* 空值占位（虚线效果） */
        .info-value.placeholder {
            color: #b8bfd4;
            font-weight: 400;
        }

        /* ===== 成绩 & 等级 特殊样式（更突出） ===== */
        .info-row.highlight .info-label {
            color: #3d4460;
            font-weight: 600;
        }

        .info-row.highlight .info-value {
            font-weight: 600;
            color: #1a1e2c;
        }

        /* 成绩数字用强调色 */
        .info-value.score {
            color: #4a6cf7;
            font-weight: 700;
            font-size: 19px;
        }

        .info-value.grade {
            display: inline-block;
            background: linear-gradient(135deg, #f7b731, #f59f00);
            color: #fff;
            font-weight: 700;
            font-size: 17px;
            padding: 0 18px;
            border-radius: 40px;
            line-height: 34px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(245, 159, 0, 0.25);
        }

        /* ===== 底部脚标 ===== */
        .card-footer {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 2px solid rgba(0, 0, 0, 0.04);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #9aa1b8;
        }

        .card-footer .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4a6cf7;
            opacity: 0.4;
        }

        .card-footer time {
            font-feature-settings: "tnum";
            letter-spacing: 0.3px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 520px) {
            .card {
                padding: 28px 20px 30px;
                border-radius: 24px;
            }

            .info-row {
                flex-wrap: wrap;
                padding: 8px 0;
            }

            .info-label {
                flex: 0 0 100%;
                font-size: 14px;
                color: #7a82a0;
                padding-bottom: 2px;
            }

            .info-label::after {
                content: '：';
            }

            .info-value {
                flex: 0 0 100%;
                font-size: 16px;
                padding-left: 0;
                padding-top: 0;
            }

            .info-value.grade {
                font-size: 15px;
                padding: 0 14px;
                line-height: 30px;
            }

            .card-header h2 {
                font-size: 17px;
            }

            .card-header .hint {
                font-size: 11px;
                padding: 2px 10px;
            }

            .card-footer {
                flex-wrap: wrap;
                justify-content: flex-start;
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 20px 14px 22px;
                border-radius: 18px;
            }

            .info-value {
                font-size: 14px;
            }

            .info-value.score {
                font-size: 16px;
            }
        }

        /* ===== 打印样式（可选） ===== */
        @media print {
            body {
                background: #fff;
                padding: 0;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ddd;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                transform: none !important;
            }
            .card:hover {
                transform: none !important;
                box-shadow: none !important;
            }
            .card-header .badge {
                background: #4a6cf7 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .info-value.grade {
                background: #f7b731 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="card" role="main" aria-label="信息卡片">

        <!-- 头部 -->
        <div class="card-header">
            <span class="badge" aria-hidden="true">📋</span>
            <h2>个人信息</h2>
            <span class="hint">· 档案</span>
        </div>

        <!-- 信息列表 -->
        <div class="info-grid">

            <!-- 姓名 -->
            <div class="info-row">
                <span class="info-label">姓 名</span>
                <span class="info-value">张 明 轩</span>
            </div>

            <!-- 性别 -->
            <div class="info-row">
                <span class="info-label">性 别</span>
                <span class="info-value">男</span>
            </div>

            <!-- 身份证号 -->
            <div class="info-row">
                <span class="info-label">身份证号</span>
                <span class="info-value" style="font-family: 'Inter', 'SF Mono', 'Menlo', monospace; letter-spacing: 0.5px; font-feature-settings: 'tnum';">11010119900307663X</span>
            </div>

            <!-- 成绩（高亮行） -->
            <div class="info-row highlight">
                <span class="info-label">成 绩</span>
                <span class="info-value score">94.5</span>
            </div>

            <!-- 等级（高亮行 + 标签） -->
            <div class="info-row highlight">
                <span class="info-label">等 级</span>
                <span class="info-value">
                    <span class="grade">优秀</span>
                </span>
            </div>

        </div>

        <!-- 底部 -->
        <div class="card-footer">
            <span class="dot"></span>
            <span>数据更新于</span>
            <time datetime="2026-07-04">2026 年 7 月 4 日</time>
        </div>

    </div>

</body>
</html>
